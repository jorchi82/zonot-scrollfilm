[build]
  command = ""
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = ""
  publish = "."

[context.deploy-preview]
  command = ""
  publish = "."

[context.branch-deploy]
  command = ""
  publish = "."

[headers]
  [[headers.values]]
    key = "Cache-Control"
    value = "public, max-age=3600"

[headers.values]
  [[headers.values]]
    key = "X-Frame-Options"
    value = "SAMEORIGIN"
  [[headers.values]]
    key = "X-Content-Type-Options"
    value = "nosniff"
