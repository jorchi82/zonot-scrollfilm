[build]
  command = ""
  publish = "."

[[edge_functions]]
  path = "/"
  function = "geo-lang"

[[redirects]]
  from = "/api/sonar"
  to = "https://zonotv1.netlify.app/api/sonar"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
